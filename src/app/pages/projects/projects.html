<section class="m-6 text-start flex flex-col">
  <div class="flex items-center justify-between">
    <button (click)="goHome()"
      class="flex items-center gap-4 h-8 m-2 cursor-pointer w-fit
        transition-all duration-300 hover:transform-[translateY(-.2rem)]">
      <lucide-icon name="arrow-left"></lucide-icon>
      Go back
    </button>
    <app-pill label="Projects" size="md"></app-pill>
  </div>

  @if(projectState$ | async; as projectState){
    <app-block [id]="'pj_block_1'" [loading]="projectState.loading"
      [title]="'Client Projects'" [class]="'border-0 [--card:var(--color-background)] [--card-foreground:var(--type-color)]'">
        <lucide-icon slot="icon" [name]="'Blocks'"></lucide-icon>

        <ng-container slot="content">
          <app-highlights [gridStyle]="'md:grid-cols-2'" [data]="projectState.loading? []:corpoProjects" class="w-[90%]" ></app-highlights>
        </ng-container>

    </app-block>

    <app-github class="[--card:var(--color-background)] [--card-foreground:var(--type-color)]"
      [loading]="projectState.loading" [data]="projectState.githubRepoPublic">
    </app-github>
  }

</section>
