<div class="m-6 text-start flex flex-col">
  <button (click)="goHome()"
    class="flex items-center gap-4 h-8 m-2 cursor-pointer w-fit
      transition-all duration-300 hover:transform-[translateY(-.2rem)] hover:shadow-xl">
    <lucide-icon name="arrow-left"></lucide-icon>
    Go back
  </button>

  @if(projectState$ | async; as projectState){
    <app-block [id]="'pj_block_1'" [loading]="projectState.loading"
      [title]="'Client Projects'" [class]="'border-0 bg-transparent'">
      <!-- @if(block.icon){ -->
        <lucide-icon slot="icon" [name]="'Blocks'"></lucide-icon>
      <!-- } -->

        <ng-container slot="content">
          <app-highlights [data]="projectState.loading? []:corpoProjects" class="w-[90%]" ></app-highlights>
        </ng-container>

    </app-block>

    <app-github [loading]="projectState.loading" [data]="projectState.githubRepoPublic"></app-github>
  }

</div>
