<article class='p-6 sm:p-8 flex relative flex-col md:flex-row md:justify-start gap-4 items-center md:items-center' aria-labelledby='profile-heading'>
  <app-theme-toggler class="absolute right-10 top-10"></app-theme-toggler>

  <figure class='m-1 shrink-0'>
    <!-- Single img with data attributes for dark/light variants. JS swaps src on theme changes and falls back if a variant 404s. -->
    <img id="profile-img" class='rounded-full m-auto w-28 sm:w-32 md:w-40' [src]="imgSrc" [attr.data-dark]="darkSrc" [attr.data-light]="lightSrc" (error)="onImgError()" [class.profile-filter-light]="useFilter" alt='Photo of Jonathan Golimlim' style="border:2px solid var(--border)" />
    <figcaption class='sr-only'>Photo of Jonathan Golimlim</figcaption>
  </figure>

  <div class="flex flex-col justify-evenly items-center md:items-start text-center md:text-left">
    <header class='flex flex-col justify-center'>
      <h2 id='profile-heading' class='text-3xl md:text-[1.7rem] font-bold flex'>
        Jonathan Golimlim
      </h2>

      <p class='flex items-center text-base gap-2 justify-center md:justify-start'>
        <lucide-angular name="map-pin" size="15" aria-hidden="true"></lucide-angular>
        <span>Quezon City, Philippines</span>
      </p>

    </header>

    <aside aria-label="Profile actions">
      <address class='not-italic'>
        <nav aria-label="Social and resume links">
          <ul class="flex justify-center md:justify-start gap-1 py-1 px-2 w-full">
            <app-pill label="Software Engineer" size="sm"></app-pill>
            <app-pill label="Fullstack Developer" size="sm"></app-pill>
            <li [class]="`p-1 flex gap-1 justify-center items-center border border-[#292929] rounded-full ${TRANSITION_MOVE_UP}`">
              <a href="https://github.com/jobearry" target="_blank" rel="noopener noreferrer" aria-label="View GitHub profile"
                class="profile-action-link no-underline hover:no-underline text-inherit flex items-center justify-center">
                <lucide-angular name="github" size="15" aria-hidden="true" class="profile-action-icon"></lucide-angular>
              </a>
            </li>
            <li [class]="`p-1 flex gap-1 justify-center items-center border border-[#292929] rounded-full ${TRANSITION_MOVE_UP}`">
              <a href="#" target="_blank" rel="noopener noreferrer" aria-label="Download CV"
                class="profile-action-link no-underline hover:no-underline text-inherit flex items-center justify-center">
                <lucide-angular name="file-down" size="15" aria-hidden="true" class="profile-action-icon"></lucide-angular>
              </a>
            </li>
          </ul>
        </nav>
      </address>
    </aside>

  </div>
</article>
