<section class="grid md:grid-cols-6 scroll-smooth p-4">
  <div class="w-full col-span-full md:col-span-2">
    @for(block of sideblock; track $index){
      <app-block [id]="block.id" [title]="block.title!" [class]="block.class! + ' rounded-sm'">
        @if(block.icon){
        <lucide-icon slot="icon" [name]="block.icon"></lucide-icon>
        }

        <ng-container slot="content">
          <app-host [component]="block.content!" [inputs]="block.inputs">
          </app-host>
        </ng-container>

      </app-block>
    }
  </div>
  <div class="w-full col-span-full md:col-span-4">
    @for(block of mainblock; track $index){
      <app-block [id]="block.id" [title]="block.title!" [class]="block.class! + ' border-0 border-b'">
        @if(block.icon){
        <lucide-icon slot="icon" [name]="block.icon"></lucide-icon>
        }

        <ng-container slot="content">
          <app-host [component]="block.content!" [inputs]="block.inputs">
          </app-host>
        </ng-container>

      </app-block>
    }
    <app-block [id]="'heatmap_block'" [title]="'TechStack'" [class]="' bg-transparent' + ' border-0 border-b'">
      <lucide-icon slot="icon" [name]="'Toolbox'"></lucide-icon>

      <ng-container slot="content">
        <app-maintenance></app-maintenance>
      </ng-container>
    </app-block>
  </div>
</section>
